<main class="min-h-screen flex items-center justify-center bg-neutral-950 p-6 text-neutral-100">
  <section class="w-full max-w-md rounded-2xl bg-neutral-900 p-8 shadow-xl ring-1 ring-white/10">
    <h1 class="mb-6 text-sm font-medium uppercase tracking-widest text-neutral-400">
      Now Playing
    </h1>

    @if (nowPlaying() === undefined) {
      <!-- Loading / connecting -->
      <p class="text-neutral-400">Connecting to Last.fm…</p>
    } @else if (nowPlaying() === null) {
      <!-- Nothing playing -->
      <p class="text-neutral-400">Nothing playing right now</p>
    } @else {
      <!-- Currently playing -->
      <div class="flex items-center gap-4">
        @if (nowPlaying()!.imageUrl) {
          <img
            [src]="nowPlaying()!.imageUrl"
            [alt]="nowPlaying()!.album"
            class="h-20 w-20 flex-none rounded-lg object-cover ring-1 ring-white/10"
          />
        }
        <div class="min-w-0">
          <p class="truncate text-lg font-semibold">{{ nowPlaying()!.name }}</p>
          <p class="truncate text-neutral-300">{{ nowPlaying()!.artist }}</p>
          <p class="truncate text-sm text-neutral-500">{{ nowPlaying()!.album }}</p>
        </div>
      </div>
    }
  </section>
</main>
